<div class="table-view-container">

    <!-- ========== Filter Bar (Todo Mode only) ========== -->
    <div *ngIf="!isUsersMode" class="table-filter-bar">
        <div class="filter-grid">
            <div class="filter-field">
                <label class="filter-field__label">Title</label>
                <app-input-form
                    [formGroup]="filterForm"
                    name="title"
                    [isFilter]="true"
                    placeholder="Search by title..."
                    [type]="InputTypes.TEXT"
                />
            </div>
            <div class="filter-field">
                <label class="filter-field__label">Priority</label>
                <app-dropdown-form
                    [formGroup]="filterForm"
                    [name]="filterFields[1].formControlName"
                    [isFilter]="true"
                    [field]="filterFields[1]"
                />
            </div>
            <div class="filter-field">
                <label class="filter-field__label">Status</label>
                <app-dropdown-form
                    [formGroup]="filterForm"
                    [name]="filterFields[2].formControlName"
                    [isFilter]="true"
                    [field]="filterFields[2]"
                />
            </div>
            <div class="filter-field">
                <label class="filter-field__label">Type</label>
                <app-dropdown-form
                    [formGroup]="filterForm"
                    [name]="filterFields[3].formControlName"
                    [isFilter]="true"
                    [field]="filterFields[3]"
                />
            </div>
            <div class="filter-field">
                <label class="filter-field__label">Created from</label>
                <app-date-picker
                    [formGroup]="filterForm"
                    [name]="filterFields[4].formControlName"
                    [isFilter]="true"
                    [field]="filterFields[4]"
                />
            </div>
            <div class="filter-field">
                <label class="filter-field__label">Created to</label>
                <app-date-picker
                    [formGroup]="filterForm"
                    [name]="filterFields[5].formControlName"
                    [isFilter]="true"
                    [field]="filterFields[5]"
                />
            </div>
        </div>
        <button
            *ngIf="hasActiveFilters"
            type="button"
            class="clear-filters-btn"
            (click)="clearFilters()"
            title="Clear all filters"
        >
            <i class="bi bi-x-circle"></i>
            <span>Clear</span>
        </button>
    </div>

    <div class="custom-table-wrapper">
        <table class="custom-table" [class.todo-table]="!isUsersMode" [class.user-table]="isUsersMode">
            <!-- ========== Users Mode ========== -->
            <ng-container *ngIf="isUsersMode; else todoMode">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th *ngIf="showActionsColumn" class="actions-col">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let user of users; let i = index; trackBy: trackById"
                        [ngClass]="{ 'current-user': isCurrentUser(user.id), 'role-admin': user.role === 'admin' }">
                        <td data-label="#">{{ i + 1 }}</td>
                        <td data-label="ID">{{ user.id }}</td>
                        <td data-label="Username">{{ user.username | titlecase }}</td>
                        <td data-label="Email">{{ user.email }}</td>
                        <td data-label="Role">
                            <app-dropdown-form
                                class="table-dropdown"
                                [field]="getRoleField(user)"
                                [ngModel]="user.role"
                                (ngModelChange)="onRoleChange(user.id, $event)"
                                [isBadge]="true"
                                [customInputClass]="'role-dropdown'"
                            />
                        </td>
                        <td *ngIf="showActionsColumn" class="actions-cell" data-label="Actions">
                            <div class="table-actions">
                                <button
                                    class="table-action-btn delete"
                                    [disabled]="isCurrentUser(user.id)"
                                    (click)="onDeleteUser(user.id)"
                                    title="Delete user"
                                >
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr *ngIf="users.length === 0">
                        <td [attr.colspan]="showActionsColumn ? 6 : 5" class="empty-row-cell">
                            <div class="empty-table-msg">{{ emptyMessage }}</div>
                        </td>
                    </tr>
                </tbody>
            </ng-container>

            <!-- ========== Todo Mode ========== -->
            <ng-template #todoMode>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>Category</th>
                        <th>Due Date</th>
                        <th class="created-col sortable" (click)="toggleSort()">
                            Created
                            <i class="bi" [class.bi-arrow-down-short]="sortOrder === 'desc'" [class.bi-arrow-up-short]="sortOrder === 'asc'"></i>
                        </th>
                        <th *ngIf="showActionsColumn" class="actions-col">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let todo of todos; trackBy: trackById"
                        [class.status-done]="todo.status === 'done'"
                        [class.status-inProgress]="todo.status === 'inProgress'"
                        [class.marked-deleted]="todo.is_deleted">
                        <td class="title-cell" data-label="Title">
                            <div class="title-wrapper" *ngIf="editingTitleId !== todo.id; else editTitleTpl">
                                <a [routerLink]="['/', LayoutPaths.TODO_VIEW, todo.id]" class="todo-link">{{ todo.title }}</a>
                                <button
                                    *ngIf="!todo.is_deleted && canEditTodo(todo)"
                                    class="title-edit-btn"
                                    (click)="startEditTitle(todo); $event.preventDefault()"
                                    title="Edit title"
                                >
                                    <i class="bi bi-pencil-fill"></i>
                                </button>
                            </div>
                            <ng-template #editTitleTpl>
                                <div class="title-edit-wrapper">
                                    <input
                                        class="title-edit-input"
                                        type="text"
                                        [(ngModel)]="editingTitleValue"
                                        (keydown)="onTitleKeydown($event, todo)"
                                        (blur)="saveTitleEdit(todo)"
                                        #titleInput
                                    />
                                </div>
                            </ng-template>
                        </td>
                        <td data-label="Type">
                            <span class="type-badge" [ngClass]="getTypeClass(todo)">
                                <i class="bi" 
                                   [class.bi-layers-fill]="getTodoType(todo) === 'project'"
                                   [class.bi-journal-bookmark-fill]="getTodoType(todo) === 'story'"
                                   [class.bi-clipboard-check-fill]="getTodoType(todo) === 'workitem'"
                                   [class.bi-check2-square]="getTodoType(todo) === 'task'"></i>
                                {{ getTodoType(todo) }}
                            </span>
                        </td>
                        <td data-label="Status">
                            <app-dropdown-form
                                class="table-dropdown"
                                [field]="getStatusField(todo)"
                                [ngModel]="todo.status"
                                (ngModelChange)="onFieldChange(todo, 'status', $event)"
                                [isBadge]="true"
                                [customInputClass]="getStatusClass($any(todo).status)"
                                [class.disabled-field]="todo.is_deleted || !canEditTodo(todo)"
                                [disabled]="!canEditTodo(todo)"
                            />
                        </td>
                        <td data-label="Priority">
                            <app-dropdown-form
                                class="table-dropdown"
                                [field]="getPriorityField(todo)"
                                [ngModel]="todo.priority"
                                (ngModelChange)="onFieldChange(todo, 'priority', $event)"
                                [isBadge]="true"
                                [customInputClass]="getPriorityClass($any(todo).priority)"
                                [class.disabled-field]="todo.is_deleted || !canEditTodo(todo)"
                                [disabled]="!canEditTodo(todo)"
                            />
                        </td>
                        <td data-label="Category">
                            <app-dropdown-form
                                *ngIf="customCategoryTodoId !== todo.id"
                                class="table-dropdown"
                                [field]="getCategoryField(todo)"
                                [ngModel]="getCategoryField(todo).value"
                                (ngModelChange)="onCategoryChange(todo, $event)"
                                [isBadge]="true"
                                customInputClass="inline-category-dropdown"
                                [class.disabled-field]="todo.is_deleted || !canEditTodo(todo)"
                                [disabled]="!canEditTodo(todo)"
                            />
                            <div *ngIf="customCategoryTodoId === todo.id" class="custom-category-inline">
                                <input
                                    type="text"
                                    class="custom-category-input"
                                    [(ngModel)]="customCategoryValue"
                                    (keydown)="onCustomCategoryKeydown($event, todo)"
                                    (blur)="saveCustomCategory(todo)"
                                    placeholder="Type category..."
                                    #customCatInput
                                />
                            </div>
                        </td>
                        <td data-label="Due Date">
                            <app-date-picker
                                class="table-date-picker"
                                [field]="getDateField(todo)"
                                [ngModel]="todo.due_date"
                                (ngModelChange)="onFieldChange(todo, 'due_date', $event)"
                                [isBadge]="true"
                                [customInputClass]="getDueDateUrgencyClass(todo.due_date)"
                                [class.disabled-field]="todo.is_deleted || !canEditTodo(todo)"
                                [disabled]="!canEditTodo(todo)"
                            />
                        </td>
                        <td data-label="Created">{{ formatCreatedAt(todo.created_at) }}</td>
                        <td *ngIf="showActionsColumn" class="actions-cell" data-label="Actions">
                            <div class="table-actions">
                                <button *ngIf="canDeleteTodo(todo)" (click)="onDelete(todo)" class="table-action-btn delete" title="Delete"
                                    [disabled]="todo.is_deleted">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr *ngIf="todos.length === 0">
                        <td [attr.colspan]="showActionsColumn ? 8 : 7" class="empty-row-cell">
                            <div class="empty-table-msg">{{ emptyMessage }}</div>
                        </td>
                    </tr>
                </tbody>
            </ng-template>
        </table>
    </div>

    <app-pagination
        *ngIf="showPagination"
        [currentPage]="currentPage"
        [pageSize]="pageSize"
        [pageSizeOptions]="pageSizeOptions"
        [totalItems]="totalItems"
        (pageChange)="pageChange.emit($event)"
        (pageSizeChange)="pageSizeChange.emit($event)"
    />
</div>
