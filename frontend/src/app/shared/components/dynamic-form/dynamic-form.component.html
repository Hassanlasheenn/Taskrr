<section class="dynamic-form-wrapper">
    <div *ngIf="errorSummary" class="error-summary-box">
        <h4 class="error-summary-title">Error</h4>
        <p class="error-summary-message">{{ errorSummary }}</p>
    </div>

    <form [formGroup]="form" [class.dynamic-form--inline]="layout === 'inline'">
        <ng-container *ngFor="let field of fields; trackBy: trackById">
            <div *ngIf="field.type === InputTypes.UPLOAD_PHOTO || field.type === InputTypes.FILE" [formGroup]="form" class="field-container">
                <app-upload-photo
                    [label]="field.label"
                    [formControlName]="field.formControlName"
                    [currentPhotoUrl]="field.photoUrl || null"
                    (photoSelected)="onPhotoSelected(field.formControlName, $event)"
                    (validationError)="onValidationError($event)"
                    (photoRemoved)="onPhotoRemoved(field.formControlName)"
                />
            </div>

            <div *ngIf="field.type === InputTypes.DROPDOWN" class="field-container">
                <app-dropdown-form
                    [label]="field.label"
                    [type]="field.type"
                    [formGroup]="form"
                    [placeholder]="field.placeholder"
                    [name]="field.formControlName"
                    [customInputStyle]="customInputStyle"
                    [customInputClass]="field.customInputClass"
                    [field]="field"
                    [showErrors]="isSubmitted"
                    [isFilter]="isFilter"
                    [isBadge]="isBadge"
                />
            </div>

            <div *ngIf="field.type === InputTypes.DATE" class="field-container">
                <app-date-picker
                    [label]="field.label"
                    [formGroup]="form"
                    [placeholder]="field.placeholder || ''"
                    [name]="field.formControlName"
                    [customInputStyle]="customInputStyle"
                    [customInputClass]="field.customInputClass"
                    [field]="field"
                    [showErrors]="isSubmitted"
                    [isFilter]="isFilter"
                    [isBadge]="isBadge"
                />
            </div>

            <div *ngIf="field.type === InputTypes.TEXTAREA" class="field-container">
                <app-textarea-form
                    [label]="field.label"
                    [formGroup]="form"
                    [placeholder]="field.placeholder || ''"
                    [name]="field.formControlName"
                    [customInputStyle]="customInputStyle"
                    [customInputClass]="field.customInputClass"
                    [field]="field"
                    [showErrors]="isSubmitted"
                    [showImagePreviews]="field.showImagePreviews !== false"
                    [imagePreviewMode]="field.imagePreviewMode || 'grid'"
                    [disableInternalLightbox]="field.disableInternalLightbox ?? false"
                    [showAttachHint]="field.showAttachHint ?? false"
                    (previewActiveChange)="previewActiveChange.emit($event)"
                    (imageClick)="imageClick.emit($event)"
                />
            </div>

            <div *ngIf="field.type === InputTypes.TIME_ESTIMATE" class="field-container">
                <app-time-input
                    [label]="field.label"
                    [formGroup]="form"
                    [placeholder]="field.placeholder || ''"
                    [name]="field.formControlName"
                    [customInputStyle]="customInputStyle"
                    [customInputClass]="field.customInputClass"
                    [field]="field"
                    [showErrors]="isSubmitted"
                />
            </div>

            <div *ngIf="field.type === InputTypes.TEXT || field.type === InputTypes.EMAIL || field.type === InputTypes.PASSWORD || field.type === InputTypes.NUMBER || field.type === InputTypes.TIME || field.type === InputTypes.CHECKBOX" class="field-container">
                <app-input-form
                    [label]="field.label"
                    [type]="field.type"
                    [formGroup]="form"
                    [placeholder]="field.placeholder || ''"
                    [name]="field.formControlName"
                    [customInputStyle]="customInputStyle"
                    [customInputClass]="field.customInputClass"
                    [field]="field"
                    [showErrors]="isSubmitted"
                    [isFilter]="isFilter"
                />
            </div>
        </ng-container>
    </form>
</section>
