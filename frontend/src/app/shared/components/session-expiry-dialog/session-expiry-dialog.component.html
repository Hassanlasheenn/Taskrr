<div class="dialog-backdrop" *ngIf="isVisible">
    <div class="dialog-container">
        <div class="dialog-header">
            <h3 class="dialog-title">
                <i class="bi bi-clock-history me-2"></i>Session Expired
            </h3>
        </div>
        <div class="dialog-body">
            <p class="dialog-message">
                Your session has expired. Would you like to continue working or log out?
            </p>
        </div>
        <div class="dialog-footer">
            <button type="button" class="dialog-button dialog-button-cancel" (click)="onLogout()">
                Logout
            </button>
            <button type="button" class="dialog-button dialog-button-primary" (click)="onContinue()">
                Continue Working
            </button>
        </div>
    </div>
</div>
