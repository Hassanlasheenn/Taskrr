<div class="admin-content flex-grow-1 d-flex flex-column">
    <app-card [card]="{ title: 'All Users' }" class="admin-card">
        <p class="section-description">Manage users, assign roles, and delete accounts.</p>

        <div *ngIf="users.length > 0" class="admin-filters-section mb-4">
            <app-dynamic-form
                [fields]="filterFields"
                [form]="filterForm"
                [layout]="'inline'"
                [isFilter]="true"
                class="w-100"
            />
        </div>

        <app-shared-table
            [users]="filteredUsers"
            [currentUserId]="currentUserId"
            (roleChange)="onRoleChange($event)"
            (deleteUser)="onDeleteUser($event)"
            emptyMessage="No users found matching your criteria"
        />
    </app-card>
</div>
