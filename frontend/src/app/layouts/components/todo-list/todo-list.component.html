<section class="todo-list-container">
    <!-- Empty State -->
    <div *ngIf="todos.length === 0" class="empty-state">
        <div class="empty-state-content">
            <div class="empty-icon">
                <i class="bi bi-clipboard-check"></i>
            </div>
            <h3 class="empty-title">No todos yet</h3>
            <p class="empty-description">Start organizing your tasks by adding your first todo</p>
            <button type="button" class="add-todo-btn" (click)="onAddTodo()">
                <i class="bi bi-plus-lg me-2"></i>
                Add Todo
            </button>
        </div>
    </div>

    <!-- Todo List -->
    <div *ngIf="todos.length > 0" class="todo-grid">
        <div class="todo-header d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-2">
                <h2 class="todo-section-title">Your Todos</h2>
                <span class="todo-count-badge">{{ totalCount }}</span>
            </div>
            <button type="button" class="add-todo-btn-small" (click)="onAddTodo()">
                <i class="bi bi-plus-lg me-1"></i>
                Add
            </button>
        </div>
        
        <div class="todo-cards row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">
            <div *ngFor="let todo of todos; trackBy: trackById" class="col">
            <div 
                class="todo-card h-100"
                [class.completed]="todo.completed"
                [ngClass]="getPriorityClass(todo.priority)"
            >
                <div class="todo-card-header">
                    <span class="todo-index">#{{ todo.order_index }}</span>
                    <span class="priority-badge" [ngClass]="getPriorityClass(todo.priority)">
                        <i [class]="'bi ' + getPriorityIcon(todo.priority)"></i>
                        {{ todo.priority }}
                    </span>
                </div>
                <div class="todo-card-content">
                    <button 
                        type="button" 
                        class="todo-checkbox"
                        [class.checked]="todo.completed"
                        (click)="onToggleTodo(todo)"
                    >
                        <i *ngIf="todo.completed" class="bi bi-check"></i>
                    </button>
                    <div class="todo-info">
                        <h4 class="todo-title">{{ todo.title }}</h4>
                        <p *ngIf="todo.description" class="todo-description">{{ todo.description }}</p>
                    </div>
                    <button 
                        type="button" 
                        class="todo-edit-btn"
                        (click)="onEditTodo(todo)"
                        aria-label="Edit todo"
                    >
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button 
                        type="button" 
                        class="todo-delete-btn"
                        (click)="onDeleteTodo(todo)"
                        aria-label="Delete todo"
                    >
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
                <div class="todo-card-footer" *ngIf="formatDate(todo.created_at) as dateInfo">
                    <div class="created-at">
                        <i class="bi bi-calendar3"></i>
                        <div class="date-info">
                            <span class="date-day">{{ dateInfo.day }}</span>
                            <span class="date-full">{{ dateInfo.date }}</span>
                        </div>
                        <div class="time-info">
                            <i class="bi bi-clock"></i>
                            <span>{{ dateInfo.time }}</span>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>
</section>
