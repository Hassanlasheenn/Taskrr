<section class="user-profile-wrapper">
    <div class="container-fluid px-2 px-sm-3 px-md-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-8">
                <div class="d-flex flex-column flex-lg-row align-items-stretch gap-3 gap-lg-4">
                    <app-profile-side-nav
                        class="side-nav-wrapper d-flex"
                        [activeSection]="activeSection"
                        (sectionChange)="onSectionChange($event)"
                    />

                    <div class="profile-content flex-grow-1 d-flex flex-column">
                        <app-personal-data
                            *ngIf="activeSection === ProfileSections.PERSONAL_DATA"
                            class="flex-grow-1 d-flex flex-column"
                            [userData]="userData"
                            (formSubmit)="onPersonalDataSubmit($event)"
                        />

                        <div *ngIf="activeSection === ProfileSections.RESET_PASSWORD" class="profile-section flex-grow-1 d-flex flex-column">
                            <app-card [card]="{ title: 'Reset Password' }" class="profile-card flex-grow-1">
                                <p class="section-description">Change your password to keep your account secure.</p>
                                <div class="coming-soon d-flex flex-column align-items-center justify-content-center text-center py-5">
                                    <i class="bi bi-lock"></i>
                                    <p>Reset password functionality coming soon</p>
                                </div>
                            </app-card>
                        </div>

                        <div *ngIf="activeSection === ProfileSections.NOTIFICATION_SETTINGS" class="profile-section flex-grow-1 d-flex flex-column">
                            <app-card [card]="{ title: 'Notification Settings' }" class="profile-card flex-grow-1">
                                <p class="section-description">Manage how you receive notifications.</p>
                                <div class="coming-soon d-flex flex-column align-items-center justify-content-center text-center py-5">
                                    <i class="bi bi-bell-slash"></i>
                                    <p>Notification settings coming soon</p>
                                </div>
                            </app-card>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
