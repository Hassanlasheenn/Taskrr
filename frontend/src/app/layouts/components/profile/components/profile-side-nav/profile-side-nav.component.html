<nav class="profile-side-nav d-flex justify-content-center justify-content-lg-start">
    <ul class="side-nav-list d-flex flex-row flex-lg-column flex-wrap flex-lg-nowrap justify-content-center justify-content-lg-start align-items-center align-items-lg-stretch gap-2 gap-lg-2 list-unstyled m-0 p-0 w-100">
        <li *ngFor="let item of navItems" class="flex-lg-grow-0">
            <button
                type="button"
                class="side-nav-item d-flex flex-column flex-sm-row align-items-center justify-content-center justify-content-lg-start gap-1 gap-sm-2 w-100"
                [class.active]="activeSection === item.section"
                (click)="onSectionClick(item.section)"
            >
                <i [class]="item.icon"></i>
                <span>{{ item.label }}</span>
            </button>
        </li>
    </ul>
</nav>
