<section class="user-details-wrapper">
    <div class="user-details-layout">
        <div class="user-details-content flex-grow-1 d-flex flex-column">
            <header class="user-details-header mb-4" *ngIf="userData">
                <div class="user-profile-summary">
                    <div class="user-avatar-container">
                        <div class="user-avatar-large">
                            <img *ngIf="userData.user.photo" [src]="userData.user.photo" [alt]="userData.user.username">
                            <i *ngIf="!userData.user.photo" class="bi bi-person-circle"></i>
                        </div>
                        <span class="role-badge" [class.admin]="userData.user.role === 'admin'">
                            {{ userData.user.role | titlecase }}
                        </span>
                    </div>
                    <div class="user-info-text">
                        <div class="user-name-row">
                            <h1 class="user-name">{{ userData.user.username | titlecase }}</h1>
                        </div>
                        <p class="user-email"><i class="bi bi-envelope"></i> {{ userData.user.email }}</p>
                    </div>
                    <div class="header-actions ms-auto d-flex align-items-center gap-2">
                        <div class="view-toggle d-flex">
                            <button 
                                type="button" 
                                class="view-toggle-btn"
                                [class.active]="viewMode === 'grid'"
                                (click)="setViewMode('grid')"
                                title="Kanban View"
                            >
                                <i class="bi bi-kanban"></i>
                            </button>
                            <button 
                                type="button" 
                                class="view-toggle-btn"
                                [class.active]="viewMode === 'table'"
                                (click)="setViewMode('table')"
                                title="Table View"
                            >
                                <i class="bi bi-table"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="todos-dashboard" *ngIf="userData">
                <!-- Column Bars View -->
                <app-todo-columns
                    *ngIf="viewMode === 'grid'"
                    [todos]="userTodos"
                    [unassignedTodos]="unassignedTodos"
                    [showUnassigned]="isAdmin && userData?.user?.role === 'admin'"
                    [todoViewPath]="layoutPaths.TODO_VIEW"
                    [userId]="userId"
                    (edit)="onEditTodo($event)"
                    (delete)="onDeleteTodo($event)"
                    (statusChange)="onTodoStatusChange($event)"
                    (unassign)="onTodoUnassign($event)"
                />

                <!-- Table View -->
                <div *ngIf="viewMode === 'table'" class="table-view-container">
                    <app-shared-table
                        [todos]="tableTodos"
                        [isAdmin]="isAdmin"
                        [totalItems]="tableTotal"
                        [currentPage]="tablePage"
                        [pageSize]="tablePageSize"
                        (update)="onUpdateTodo($event)"
                        (delete)="onDeleteTodo($event)"
                        (pageChange)="onTablePageChange($event)"
                        (pageSizeChange)="onTablePageSizeChange($event)"
                        (sortChange)="onTableSortChange($event)"
                        (filterChange)="onTableFilterChange($event)"
                    />
                </div>
            </div>        </div>
    </div>
</section>
