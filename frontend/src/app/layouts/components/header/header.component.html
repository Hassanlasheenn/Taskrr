<section class="header">
    <div class="d-flex justify-content-between align-items-center h-100">
        <button 
            type="button" 
            class="header-logo-btn"
            [routerLink]="[LayoutPaths.DASHBOARD]"
        >
            <span class="fs-1 fw-bold">TODO</span>
        </button>
        <div class="d-flex align-items-center gap-3">
            <app-theme-toggle />
            
            <ng-container *ngIf="isAuthenticated">
                <button 
                    *ngIf="isAdmin"
                    type="button" 
                    class="admin-btn"
                    [routerLink]="[LayoutPaths.ADMIN]"
                    aria-label="Admin Panel"
                    title="Admin Panel"
                >
                    <i class="bi bi-shield-check"></i>
                </button>
                <app-notifications />
                <div class="dropdown" [class.show]="isDropdownOpen">
                    <button 
                        class="user-circle" 
                        type="button" 
                        (click)="toggleDropdown()"
                        aria-expanded="false"
                    >
                        <img 
                            *ngIf="userPhoto" 
                            [src]="getPhotoUrl()" 
                            alt="User profile"
                            class="user-photo"
                        />
                        <i *ngIf="!userPhoto" class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" [class.show]="isDropdownOpen">
                        <div class="dropdown-actions">
                            <button class="dropdown-item" (click)="onProfile()" aria-label="Profile">
                                <i class="bi bi-person-circle"></i>
                                <span class="item-label">Profile</span>
                            </button>
                            <button class="dropdown-item" (click)="onLogout()" aria-label="Logout">
                                <i class="bi bi-box-arrow-right"></i>
                                <span class="item-label">Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
</section>
