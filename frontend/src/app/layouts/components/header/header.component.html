<section class="header">
    <div class="d-flex justify-content-between align-items-center h-100">
        <div class="d-flex align-items-center gap-2">
            <button 
                *ngIf="showMobileMenu"
                type="button" 
                class="mobile-nav-trigger d-lg-none" 
                (click)="toggleMobileMenu()"
                aria-label="Open navigation menu"
            >
                <i class="bi bi-list"></i>
            </button>
            <button 
                type="button" 
                class="header-logo-btn"
                [routerLink]="['/']"
            >
                <span class="fs-1 fw-bold">Taskrr</span>
            </button>
        </div>
        <div class="d-flex align-items-center gap-3">
            <app-theme-toggle *ngIf="!isAuthenticated" />
            
            <ng-container *ngIf="isAuthenticated">
                <app-notifications />
                <div class="dropdown" [class.show]="isDropdownOpen">
                    <button 
                        class="user-circle"
                        type="button" 
                        (click)="toggleDropdown()"
                        aria-expanded="false"
                    >
                        <img 
                            *ngIf="userPhoto" 
                            [src]="getPhotoUrl()"
                            alt="User profile"
                            class="user-photo"
                        />
                        <i *ngIf="!userPhoto" class="bi bi-person"></i>
                    </button>
                    <div class="dropdown-menu" [class.show]="isDropdownOpen">
                        <div class="dropdown-actions">
                            <button class="dropdown-item" (click)="onProfile()" aria-label="Profile">
                                <i class="bi bi-person-circle"></i>
                                <span class="item-label">Profile</span>
                            </button>

                            <!-- Theme Toggle inside dropdown -->
                            <button 
                                type="button"
                                class="dropdown-item dropdown-item--theme" 
                                (click)="toggleTheme(); $event.stopPropagation()" 
                                [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
                            >
                                <i [class]="isDarkMode ? 'bi bi-sun' : 'bi bi-moon-stars'"></i>
                                <span class="item-label">{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</span>
                            </button>

                            <button 
                                *ngIf="isAdmin"
                                class="dropdown-item" 
                                [routerLink]="[LayoutPaths.ADMIN]"
                                (click)="isDropdownOpen = false"
                                aria-label="User management"
                            >
                                <i class="bi bi-people"></i>
                                <span class="item-label">User management</span>
                            </button>
                            <button class="dropdown-item" (click)="onLogout()" aria-label="Logout">
                                <i class="bi bi-box-arrow-right"></i>
                                <span class="item-label">Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
</section>
