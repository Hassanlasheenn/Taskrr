<section class="header">
    <div class="d-flex justify-content-between align-items-center h-100">
        <button 
            type="button" 
            class="header-logo-btn"
            [routerLink]="[LayoutPaths.DASHBOARD]"
        >
            <span class="fs-1 fw-bold">TODO</span>
        </button>
        <div class="d-flex align-items-center gap-3" *ngIf="isAuthenticated">
            <button 
                type="button" 
                class="notification-btn"
                aria-label="Notifications"
            >
                <i class="bi bi-bell"></i>
                <!-- TODO: add dynamic value when notifications are implemented -->
                <!-- <span class="notification-badge">9</span> -->
            </button>
            <div class="dropdown" [class.show]="isDropdownOpen">
                <button 
                    class="user-circle" 
                    type="button" 
                    (click)="toggleDropdown()"
                    aria-expanded="false"
                >
                    <img 
                        *ngIf="userPhoto" 
                        [src]="getPhotoUrl()" 
                        alt="User profile"
                        class="user-photo"
                    />
                    <i *ngIf="!userPhoto" class="bi bi-person"></i>
                </button>
                <div class="dropdown-menu" [class.show]="isDropdownOpen">
                    <div class="dropdown-header">
                        <div class="user-email">{{ userEmail }}</div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" (click)="onProfile()">
                        <i class="bi bi-person-circle me-2"></i>
                        Profile
                    </button>
                    <button class="dropdown-item" (click)="onLogout()">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
