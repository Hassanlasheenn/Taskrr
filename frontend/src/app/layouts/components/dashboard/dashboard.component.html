<section class="dashboard-container">
    <div class="dashboard-header d-flex justify-content-center align-items-center">
        <h1>Hi, {{ userData?.username }}!</h1>
    </div>
    
    <app-todo-list 
        [todos]="todos"
        (addTodo)="onAddTodo()"
        (toggleTodo)="onToggleTodo($event)"
        (deleteTodo)="onDeleteTodo($event)"
    />
</section>
