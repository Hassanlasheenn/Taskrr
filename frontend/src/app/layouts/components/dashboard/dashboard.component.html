<section class="dashboard-wrapper p-2 p-sm-3 p-lg-4">
    <div class="dashboard-container d-flex flex-column flex-lg-row align-items-stretch gap-3 gap-lg-4">
        <div class="side-nav-wrapper d-none d-lg-block">
            <app-dashboard-side-nav
                [activeSection]="activeSection"
                (sectionChange)="onSectionChange($event)"
            />
        </div>

        <div class="dashboard-content flex-grow-1 d-flex flex-column">
            <div *ngIf="activeSection !== DashboardSections.CALENDAR && activeSection !== DashboardSections.COMPLETED && activeSection !== DashboardSections.ADMIN_PANEL" class="dashboard-header d-flex justify-content-center align-items-center px-3 py-3 px-sm-4 py-sm-4 px-lg-5 py-lg-4">
                <h1>{{ timeBasedGreeting }}, {{ (userData?.username | titlecase) }}</h1>
            </div>
            
            <app-calendar 
                *ngIf="activeSection === DashboardSections.CALENDAR"
                [todos]="todos"
            />

            <app-admin-panel
                *ngIf="activeSection === DashboardSections.ADMIN_PANEL"
            />

            <div *ngIf="activeSection !== DashboardSections.CALENDAR && activeSection !== DashboardSections.ADMIN_PANEL" class="todo-list-wrapper">
                <!-- Dashboard Summary Cards (Admin Overview) -->
                <div *ngIf="activeSection === DashboardSections.DASHBOARD && _authService.isAdmin()" class="filters-section">
                    <div class="admin-summary-cards mb-4">
                        <div class="summary-card unassigned" (click)="onSectionChange(DashboardSections.DASHBOARD)">
                            <div class="summary-card-icon">
                                <i class="bi bi-clipboard"></i>
                            </div>
                            <div class="summary-card-content">
                                <span class="summary-card-count">{{ unassignedCount }}</span>
                                <span class="summary-card-label">Pending Todos</span>
                            </div>
                        </div>
                        <div class="summary-card assigned" (click)="onSectionChange(DashboardSections.MY_ASSIGNED)">
                            <div class="summary-card-icon">
                                <i class="bi bi-person-check"></i>
                            </div>
                            <div class="summary-card-content">
                                <span class="summary-card-count">{{ assignedCount }}</span>
                                <span class="summary-card-label">My Assigned Todos</span>
                            </div>
                        </div>
                        <div class="summary-card completed" (click)="onSectionChange(DashboardSections.COMPLETED)">
                            <div class="summary-card-icon">
                                <i class="bi bi-check-all"></i>
                            </div>
                            <div class="summary-card-content">
                                <span class="summary-card-count">{{ completedCount }}</span>
                                <span class="summary-card-label">Completed Todos</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- My Todos Summary Cards (Admin & User context) -->
                <div *ngIf="(activeSection === DashboardSections.MY_ASSIGNED) || (activeSection === DashboardSections.DASHBOARD && !_authService.isAdmin())" class="filters-section">
                    <div class="admin-summary-cards mb-4">
                        <div class="summary-card new" (click)="onStatusChange('new')">
                            <div class="summary-card-icon">
                                <i class="bi bi-lightning-charge"></i>
                            </div>
                            <div class="summary-card-content">
                                <span class="summary-card-count">{{ newCount }}</span>
                                <span class="summary-card-label">New</span>
                            </div>
                        </div>
                        <div class="summary-card in-progress" (click)="onStatusChange('inProgress')">
                            <div class="summary-card-icon">
                                <i class="bi bi-gear-wide-connected"></i>
                            </div>
                            <div class="summary-card-content">
                                <span class="summary-card-count">{{ inProgressCount }}</span>
                                <span class="summary-card-label">In Progress</span>
                            </div>
                        </div>
                        <!-- Completed card: Shown in Dashboard for users, hidden in My Todos for non-admins -->
                        <div *ngIf="(!_authService.isAdmin() && activeSection === DashboardSections.DASHBOARD)" class="summary-card completed" (click)="onSectionChange(DashboardSections.COMPLETED)">
                            <div class="summary-card-icon">
                                <i class="bi bi-check-all"></i>
                            </div>
                            <div class="summary-card-content">
                                <span class="summary-card-count">{{ completedCount }}</span>
                                <span class="summary-card-label">Completed</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div *ngIf="activeSection === DashboardSections.DASHBOARD" class="filters-section">
                    <app-search-bar
                        placeholder="Search todos by title or description..."
                        (searchChange)="onSearchChange($event)"
                    />
                    <div *ngIf="todos.length > 0 && filteredTodos.length > 0" class="category-filters">
                        <button
                            type="button"
                            class="category-filter-btn"
                            [class.active]="selectedCategory === null"
                            (click)="onCategorySelect(null)"
                        >
                            All Categories
                        </button>
                        <button
                            *ngFor="let category of categories"
                            type="button"
                            class="category-filter-btn"
                            [class.active]="selectedCategory === category"
                            (click)="onCategorySelect(category)"
                        >
                            {{ category }}
                        </button>
                    </div>
                </div>

                <app-todo-list 
                    [todos]="filteredTodos"
                    [totalCount]="filteredTodos.length"
                    [isCompletedSection]="activeSection === DashboardSections.COMPLETED"
                    [showAddButton]="activeSection !== DashboardSections.COMPLETED"
                    [showIndex]="activeSection !== DashboardSections.COMPLETED"
                    [sectionTitle]="sectionTitle"
                    [groupByCategory]="activeSection === DashboardSections.DASHBOARD && selectedCategory === null && !searchQuery"
                    [showUsername]="true"
                    [username]="(userData?.username | titlecase) || null"
                    [showStatusFilter]="activeSection === DashboardSections.DASHBOARD || activeSection === DashboardSections.MY_ASSIGNED"
                    [activeStatus]="activeStatus"
                    [activePriority]="activePriority"
                    (addTodo)="onAddTodo()"
                    (toggleTodo)="onToggleTodo($event)"
                    (deleteTodo)="onDeleteTodo($event)"
                    (editTodo)="onEditTodo($event)"
                    (viewTodo)="onViewTodo($event)"
                    (statusChange)="onStatusChange($event)"
                    (priorityChange)="onPriorityChange($event)"
                />
            </div>
        </div>
    </div>
</section>


<app-sidebar
    [isOpen]="isSidebarOpen"
    [title]="sidebarTitle"
    [width]="'450px'"
    (closed)="onSidebarClose()"
>
    <app-todo-form
        #todoForm
        [editingTodo]="editingTodo"
        (submitTodo)="onTodoSubmit($event)"
        (updateTodo)="onTodoUpdate($event)"
        (cancel)="onSidebarClose()"
    />
</app-sidebar>

<!-- Mobile Navigation Sidebar -->
<div class="d-lg-none">
    <app-sidebar
        [isOpen]="isNavSidebarOpen"
        [title]="'Taskrr'"
        [width]="'280px'"
        [position]="'left'"
        (closed)="onNavSidebarClose()"
    >
        <div class="mobile-nav-content">
            <app-dashboard-side-nav
                [activeSection]="activeSection"
                (sectionChange)="onSectionChange($event); onNavSidebarClose()"
            />
        </div>
    </app-sidebar>
</div>
