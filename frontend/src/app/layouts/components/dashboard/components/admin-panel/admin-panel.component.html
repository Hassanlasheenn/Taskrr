<div class="admin-panel-container">
    <div class="users-minimal-list">
        <div *ngFor="let userData of usersWithTodos; trackBy: trackByUserId" class="user-minimal-row">
            <div class="user-main-info">
                <h3 class="username">{{ userData.user.username | titlecase }}</h3>
                <span class="user-role-badge" [class.role-admin]="userData.user.role === 'admin'">
                    {{ userData.user.role === 'admin' ? 'Admin' : 'User' }}
                </span>
            </div>

            <div class="user-stats-end">
                <div class="stat-group">
                    <span class="stat-value">{{ userData.todo_count }}</span>
                    <span class="stat-label">Todos</span>
                </div>
                <div class="stat-group">
                    <span class="stat-value">{{ getCompletedCount(userData.user.id) }}</span>
                    <span class="stat-label">Done</span>
                </div>
                <a *ngIf="_authService.isAdmin() && userData.user.id !== _authService.getCurrentUserId()" [routerLink]="['/', layoutPaths.USER_DETAILS, userData.user.id]" class="view-details-btn" title="View user details">
                    <i class="bi bi-eye"></i>
                </a>
            </div>
        </div>

        <div *ngIf="usersWithTodos.length === 0" class="no-users">
            <i class="bi bi-people"></i>
            <p>No users found</p>
        </div>
    </div>
</div>
