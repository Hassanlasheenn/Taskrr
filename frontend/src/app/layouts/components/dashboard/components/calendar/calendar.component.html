<div class="calendar-container">
    <div *ngIf="!isDayView" class="calendar-month-view">
        <div class="calendar-header">
            <button type="button" class="calendar-nav-btn" (click)="previousMonth()" aria-label="Previous month">
                <i class="bi bi-chevron-left"></i>
            </button>
            <h2 class="calendar-title">{{ getMonthYearLabel() }}</h2>
            <button type="button" class="calendar-nav-btn" (click)="nextMonth()" aria-label="Next month">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>

        <button type="button" class="today-btn" (click)="goToToday()">
            <i class="bi bi-calendar-check"></i>
            Today
        </button>

        <div class="calendar-grid">
            <div class="calendar-weekday" *ngFor="let day of weekDays">
                {{ day }}
            </div>

            <div
                *ngFor="let date of calendarDays; trackBy: trackByDate"
                class="calendar-day"
                [class.empty]="date === null"
                [class.today]="isToday(date)"
                [class.current-month]="isCurrentMonth(date)"
                [class.selected]="selectedDate && date && selectedDate.getTime() === date.getTime()"
                (click)="onDayClick(date)"
            >
                <div *ngIf="date" class="day-content">
                    <span class="day-number">{{ date.getDate() }}</span>
                    <div class="day-todos" *ngIf="getTodosForDate(date).length > 0">
                        <div
                            *ngFor="let todo of getTodosForDate(date)"
                            class="todo-badge"
                            [ngClass]="getPriorityClass(todo.priority)"
                            [title]="todo.title"
                        >
                            {{ todo.title }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div *ngIf="isDayView && selectedDate" class="calendar-day-view">
        <div class="day-view-header">
            <button type="button" class="back-btn" (click)="closeDayView()" aria-label="Back to calendar">
                <i class="bi bi-arrow-left"></i>
                Back
            </button>
            <h2 class="day-view-title">{{ formatSelectedDate() }}</h2>
        </div>

        <div class="day-timeline">
            <div *ngFor="let hour of hours" class="time-slot">
                <div class="time-label">
                    <span class="hour-text">{{ getHourLabel(hour) }}</span>
                </div>
                <div class="time-content">
                    <div *ngIf="getTodosForHour(hour).length === 0" class="empty-hour">
                        <span class="empty-indicator"></span>
                    </div>
                    <div *ngIf="getTodosForHour(hour).length > 0" class="hour-todos-wrapper">
                        <div class="hour-todos">
                            <div
                                *ngFor="let todo of getTodosForHour(hour); trackBy: trackByTodo"
                                class="hour-todo-item"
                                [ngClass]="getPriorityClass(todo.priority)"
                            >
                                <div class="todo-card-content">
                                    <div class="todo-content">
                                        <div class="todo-header-row">
                                            <h4 class="todo-title">{{ todo.title }}</h4>
                                            <span *ngIf="todo.status === 'done'" class="done-badge-small">Done</span>
                                        </div>
                                        
                                        <!-- Urgency-colored Full Due Date Badge for Calendar (Below Title) -->
                                        <div *ngIf="$any(todo).due_date" 
                                             class="calendar-due-badge mt-1" 
                                             [ngClass]="getDueDateUrgencyClass($any(todo).due_date)">
                                            <i class="bi bi-alarm-fill"></i>
                                            <span class="due-label">Due:</span>
                                            <span class="due-value">{{ formatFullDate($any(todo).due_date) }}</span>
                                        </div>

                                        <p *ngIf="todo.description" class="todo-description mt-2">{{ todo.description }}</p>
                                        <span class="todo-priority-badge" [ngClass]="getPriorityClass(todo.priority)">
                                            {{ todo.priority }}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
