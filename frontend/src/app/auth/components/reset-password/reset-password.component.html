<div class="login-container">
    <app-card
        [card]="{ title: 'Reset Password' }"
        class="login-form"
    >
        <div *ngIf="isSuccess" class="success-message-container">
            <div class="success-icon">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h3>Password Reset!</h3>
            <p>Your password has been successfully updated. You can now use your new password to log in.</p>
            <div class="mt-4">
                <button type="button" class="card-button" [routerLink]="['/', authPaths.LOGIN]">Back to Login</button>
            </div>
        </div>

        <ng-container *ngIf="!isSuccess">
            <p class="form-description">Create a new secure password for your account.</p>
            
            <app-dynamic-form 
                [fields]="fields" 
                [form]="form" 
                [isSubmitted]="isSubmitted" 
                [errorSummary]="errorSummary"
            />
            
            <div class="mt-4">
                <button type="button" class="card-button" (click)="onSubmit()">Reset Password</button>
            </div>

            <div class="mt-3 text-center">
                <a [routerLink]="['/', authPaths.LOGIN]" class="back-link">
                    <i class="bi bi-arrow-left"></i> Back to Login
                </a>
            </div>
        </ng-container>
    </app-card>
    <div class="login-logo d-none d-md-flex">
        <div class="logo-content">
            <h1 class="logo-text">Taskrr</h1>
            <p class="logo-subtitle">Security first. Get back to your workspace safely.</p>
        </div>
    </div>
</div>
