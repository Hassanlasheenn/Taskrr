<div class="login-container">
    <app-card
        [card]="{ title: 'Login' }"
        class="login-form"
    >
        <app-dynamic-form 
            [fields]="fields" 
            [form]="form" 
            [isSubmitted]="isSubmitted" 
            [errorSummary]="errorSummary"
        />
        <div class="mt-4">
            <button type="button" class="card-button" (click)="onSubmit()">Login</button>
        </div>

        <div class="mt-3 text-center">
            <a [routerLink]="['/auth', authPaths.FORGOT_PASSWORD]" class="forgot-password-link">Forgot Password?</a>
        </div>

        <div class="mt-2 d-flex justify-content-center align-items-center gap-1">
            <span>New to Taskrr?</span>
            <button class="link-button" [routerLink]="['/']">Sign Up</button>
        </div>
    </app-card>
    <div class="login-logo d-none d-md-flex">
        <div class="logo-content">
            <h1 class="logo-text">Taskrr</h1>
            <p class="logo-subtitle">Continue tracking your tasks and organize your life</p>
        </div>
    </div>
</div>
