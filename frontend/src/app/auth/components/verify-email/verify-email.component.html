<div class="verify-email-wrapper">
    <app-card [card]="{ title: 'Email Verification' }" class="verify-card">
        <div *ngIf="verifying" class="verification-status">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Verifying your email address...</p>
        </div>

        <div *ngIf="verified" class="verification-status success">
            <i class="bi bi-check-circle-fill text-success fs-1"></i>
            <h2 class="mt-3">Verification Successful!</h2>
            <p>Your email has been verified. You can now log in to your account.</p>
            <button class="card-button mt-3" [routerLink]="['/login']">Go to Login</button>
        </div>

        <div *ngIf="error" class="verification-status error">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
            <h2 class="mt-3">Verification Failed</h2>
            <p>{{ error }}</p>
            
            <div class="d-flex flex-column gap-2 mt-4">
                <button class="card-button" [routerLink]="['/login']">Return to Login</button>
                
                <!-- Only show if we have an email to resend to -->
                <button *ngIf="userEmail" class="link-button" (click)="resendLink()" [disabled]="isResending">
                    {{ isResending ? 'Sending...' : 'Resend Verification Link' }}
                </button>
            </div>
        </div>
    </app-card>
</div>
