  <!-- Critical CSS for Hydration & Theme -->
  <style>
    :root {
      --primary-color: #8b5cf6;
      --bg-light: #efebff;
      --bg-dark: #0a0a1a;
      --bg-gradient-light: linear-gradient(135deg, #f4f2ff 0%, #efebff 100%);
      --bg-gradient-dark: linear-gradient(135deg, #0a0a1a 0%, #13132b 100%);
    }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-light);
      background: var(--bg-gradient-light);
      transition: background-color 0.3s ease;
    }

    body.dark-theme {
      background: var(--bg-dark);
      background: var(--bg-gradient-dark);
    }

    /* Preloader Styles */
    .app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: transparent;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loader-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(139, 92, 246, 0.1);
      border-radius: 50%;
      border-top-color: var(--primary-color);
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide app-root until hydration if desired, or let Angular handle it */
    app-root:empty {
      display: none;
    }
  </style>

  <!-- Theme Locking Script (Executes before body renders) -->
  <script>
    (function() {
      try {
        const savedTheme = localStorage.getItem('app-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (systemDark ? 'dark' : 'light');
        
        if (theme === 'dark') {
          document.body.classList.add('dark-theme');
          document.body.classList.remove('light-theme');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0a0a1a');
        } else {
          document.body.classList.add('light-theme');
          document.body.classList.remove('dark-theme');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f5f5f5');
        }
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
