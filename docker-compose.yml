version: '3.8'

services:
  nginx:
    build: ./nginx
    container_name: todo_app_nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend-dist:/var/www/frontend:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - todo_app_network

  backend:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - todo_app_network
    deploy:
      replicas: 3

  redis:
    image: redis:7-alpine
    container_name: todo_app_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - todo_app_network

volumes:
  redis_data:
    driver: local

networks:
  todo_app_network:
    driver: bridge
