services:
  nginx:
    build: ./nginx
    container_name: todo_app_nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend-dist:/var/www/frontend:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - todo_app_network

  backend:
    build: ./backend
    platform: linux/amd64
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/todoDB}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - todo_app_network
    deploy:
      replicas: 3

  # ── Postgres (Default for Mac/Linux users) ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: todo_app_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todoDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - todo_app_network

  # ── Redis Cache ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: todo_app_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - todo_app_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  todo_app_network:
    driver: bridge
