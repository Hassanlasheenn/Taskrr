name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'nginx/**'
      - 'docker-compose.prod.yml'
      - 'Dockerfile.prod'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      any_changes: ${{ steps.filter.outputs.any_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            any_changes:
              - 'frontend/**'
              - 'backend/**'
              - 'nginx/**'
              - 'docker-compose.prod.yml'
              - 'Dockerfile.prod'
              - '.github/workflows/deploy.yml'

  validate-frontend:
    name: Validate Frontend Build
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Test Production Build
        working-directory: ./frontend
        run: npm run build -- --configuration=production

  validate-backend:
    name: Validate Backend Dependencies
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax Check (including Migrations)
        working-directory: ./backend
        run: |
          # Check for syntax errors in the entire backend and migrations folder
          python -m compileall app/ migrations/ main.py

  deploy-aws:
    name: Deploy to AWS (Self-Hosted)
    needs: [detect-changes, validate-frontend, validate-backend]
    # This job runs if any changes were detected AND the validation jobs (if they ran) passed
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (needs.detect-changes.outputs.any_changes == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.validate-frontend.result == 'success' || needs.validate-frontend.result == 'skipped') &&
      (needs.validate-backend.result == 'success' || needs.validate-backend.result == 'skipped')
    runs-on: self-hosted
    steps:
      - name: Sync Code and Deploy
        run: |
          cd ~/TaskHub
          git fetch origin master
          git reset --hard origin/master
          docker compose -f docker-compose.prod.yml up -d --build
          docker image prune -f
