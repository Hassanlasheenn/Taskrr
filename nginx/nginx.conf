worker_processes auto;

events {
    worker_connections 2048; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format load_balancer_logs '$remote_addr - $remote_user [$time_local] '
                                  '"$request" $status $body_bytes_sent '
                                  '"$http_referer" "$http_user_agent" '
                                  'TO_BACKEND: $upstream_addr '
                                  'RT: $upstream_response_time';

    access_log /var/log/nginx/access.log load_balancer_logs;

    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend_servers {
        server backend:8000;
    }

    # HTTP Server - Redirect everything to HTTPS
    server {
        listen 80;
        server_name taskrr.app www.taskrr.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name taskrr.app www.taskrr.app;

        # SSL Certificates (managed by Certbot)
        ssl_certificate /etc/letsencrypt/live/taskrr.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/taskrr.app/privkey.pem;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Served-By $upstream_addr always;

        gzip on;
        gzip_types application/json text/plain text/css application/javascript;

        resolver 127.0.0.11 valid=5s;

        location /nginx-health {
            return 200 '{"status":"ok"}';
        }

        # Static files from backend (profile pictures)
        location /static/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Backend API Proxy
        # We use a more specific matching to avoid catching frontend routes
        # 1. Catch paths that are only backend: /todos, /users, /notifications, /health, /verify-email, /resend-verification
        # 2. Catch /login, /register, /logout ONLY if they are NOT a simple browser GET (checked via Accept header or just by assuming frontend wants the page)
        location ~ ^/(todos|users|notifications|health|verify-email|resend-verification) {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Special handling for /login, /register, /logout to support both frontend and backend
        location ~ ^/(login|register|logout|admin) {
            # If it's a POST request, it's definitely for the backend
            if ($request_method = POST) {
                proxy_pass http://backend_servers;
            }
            # For GET requests, we check if it's an API call (usually doesn't want HTML)
            # But simpler: if the file doesn't exist, try the backend, then fallback to index.html
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
        }

        # Frontend Root
        location / {
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
        }
    }
}
