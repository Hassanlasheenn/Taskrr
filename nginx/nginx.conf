worker_processes auto;

events {
    worker_connections 2048; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 10M;

    log_format load_balancer_logs '$remote_addr - $remote_user [$time_local] '
                                  '"$request" $status $body_bytes_sent '
                                  '"$http_referer" "$http_user_agent" '
                                  'TO_BACKEND: $upstream_addr '
                                  'RT: $upstream_response_time';

    access_log /var/log/nginx/access.log load_balancer_logs;

    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend_servers {
        server backend:8000;
    }

    # Main Server (HTTP 80)
    server {
        listen 80;
        server_name taskrr.app www.taskrr.app localhost;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect to HTTPS if we're not on localhost (development)
        # We only do this if we want to force SSL. For dev, we stay on HTTP.
        location / {
            if ($host != "localhost") {
                # This return 301 is only safe if you have certs. 
                # To be safer, you could move this to the SSL config file.
                # return 301 https://$host$request_uri;
            }
            
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header Vary "Accept" always;
        }

        # Static files from backend (profile pictures)
        location /static/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Backend API Proxy
        location ~ ^/(todos|users|notifications|health|admin/) {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header Vary "Accept, Authorization" always;
        }

        # Auth and Verification Routes
        location ~ ^/(login|register|logout|verify-email|resend-verification) {
            if ($request_method = POST) {
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
                proxy_pass http://backend_servers;
            }
            
            if ($http_accept ~* "application/json") {
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
                proxy_pass http://backend_servers;
            }

            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }
    }

    # HTTPS Server (Production only)
    # We include SSL config from a separate file so Nginx doesn't crash if certs are missing.
    include /etc/nginx/conf.d/*.ssl;
}
