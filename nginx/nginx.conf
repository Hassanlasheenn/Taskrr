worker_processes auto;

events {
    worker_connections 2048; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format load_balancer_logs '$remote_addr - $remote_user [$time_local] '
                                  '"$request" $status $body_bytes_sent '
                                  '"$http_referer" "$http_user_agent" '
                                  'TO_BACKEND: $upstream_addr '
                                  'RT: $upstream_response_time';

    access_log /var/log/nginx/access.log load_balancer_logs;

    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend_servers {
        # Docker's internal DNS automatically resolves 'backend' to all active replicas.
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Tell Nginx to refresh its DNS cache every 5 seconds.
        # 127.0.0.11 is the default Docker DNS resolver.
        resolver 127.0.0.11 valid=5s;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Served-By $upstream_addr always;

        gzip on;
        gzip_types application/json text/plain text/css application/javascript;

        location /nginx-health {
            return 200 '{"status":"ok"}';
        }

        location ~ ^/(todos|users|admin|register|login|logout|notifications|health) {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
        }
    }
}
